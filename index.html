<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Квиз на тип личности</title>
    <style>
        :root { --p: #6c5ce7; --bg: #f9f9fb; --t: #2d3436; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--t); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        #box { background: white; padding: 40px; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.05); width: 90%; max-width: 550px; text-align: center; }
        .progress-bar { height: 6px; width: 100%; background: #eee; border-radius: 10px; margin-bottom: 30px; overflow: hidden; }
        #progress { height: 100%; background: var(--p); width: 0%; transition: 0.4s; }
        .ans-btn { display: block; width: 100%; padding: 18px; border: 2px solid #f0f0f0; border-radius: 16px; background: none; cursor: pointer; margin-bottom: 12px; font-size: 1.05rem; text-align: left; transition: 0.2s; color: var(--t); }
        .ans-btn:hover { border-color: var(--p); background: #fdfdff; }
        #result { display: none; }
        .cta-btn { display: block; text-decoration: none; background: var(--p) !important; color: white !important; padding: 22px; border-radius: 20px; font-weight: bold; font-size: 1.2rem; margin-top: 20px; transition: 0.3s; box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .tips { text-align: left; background: #f8f9ff; padding: 25px; border-radius: 20px; margin-bottom: 30px; }
        .tips li { margin-bottom: 10px; }
    </style>
</head>
<body>

<div id="box">
    <div id="quiz-ui">
        <div class="progress-bar"><div id="progress"></div></div>
        <h2 id="q-text">Загрузка...</h2>
        <div id="options"></div>
    </div>

    <div id="result">
        <div id="res-emoji" style="font-size: 5rem;"></div>
        <h1 id="res-name" style="color: var(--p);"></h1>
        <p id="res-desc" style="line-height: 1.6;"></p>
        <div class="tips">
            <strong>Стратегия роста:</strong>
            <ul id="res-tips" style="padding-left: 20px; margin-top: 10px;"></ul>
        </div>
        <a href="#" id="res-link" class="cta-btn">Получить результат</a>
        <a href="#" onclick="location.reload()" style="display:block; margin-top: 20px; color: #999;">Пройти заново</a>
    </div>
</div>

<script>
    const config = JSON.parse(localStorage.getItem('quiz_config_pro')) || {
        settings: { primary: '#6c5ce7', bg: '#f9f9fb', text: '#2d3436' },
        questions: [{ q: "Где берешь энергию?", a1: "С людьми", v1: 2, a2: "В тишине", v2: 0 }]
    };

    document.documentElement.style.setProperty('--p', config.settings.primary);
    document.documentElement.style.setProperty('--bg', config.settings.bg);
    document.documentElement.style.setProperty('--t', config.settings.text);

    let step = 0; let score = 0;

    function render() {
        if (step >= config.questions.length) return finish();
        const data = config.questions[step];
        document.getElementById('q-text').innerText = data.q;
        const optBox = document.getElementById('options');
        optBox.innerHTML = '';
        [1,2].forEach(i => {
            if (data[`a${i}`]) {
                const b = document.createElement('button');
                b.className = 'ans-btn';
                b.innerText = data[`a${i}`];
                b.onclick = () => { score += parseInt(data[`v${i}`]); step++; render(); };
                optBox.appendChild(b);
            }
        });
        document.getElementById('progress').style.width = (step / config.questions.length) * 100 + '%';
    }

    function finish() {
        document.getElementById('quiz-ui').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        const avg = score / config.questions.length;
        let r = {};

        if (avg < 0.7) {
            r = { n: "Интроверт", e: "🧘‍♂️", d: "Твоя сила в глубине и смыслах.", t: ["Автоворонки", "Тексты", "Малые группы"], l: config.settings.urlIntro, bt: config.settings.btnIntro };
        } else if (avg < 1.4) {
            r = { n: "Амбиверт", e: "🌓", d: "Ты универсальный игрок.", t: ["Гибридные модели", "Баланс отдыха", "Системность"], l: config.settings.urlAmbi, bt: config.settings.btnAmbi };
        } else {
            r = { n: "Экстраверт", e: "🔥", d: "Ты человек-магнит!", t: ["Эфиры", "Нетворкинг", "Групповые продажи"], l: config.settings.urlExtra, bt: config.settings.btnExtra };
        }

        document.getElementById('res-emoji').innerText = r.e;
        document.getElementById('res-name').innerText = r.n;
        document.getElementById('res-desc').innerText = r.d;
        document.getElementById('res-tips').innerHTML = r.t.map(i => `<li>${i}</li>`).join('');
        
        const link = document.getElementById('res-link');
        link.href = r.l || "#";
        link.innerText = r.bt || `Забрать стратегию для ${r.n}а`;

        if (config.settings.tgToken) {
            fetch(`https://api.telegram.org/bot${config.settings.tgToken}/sendMessage?chat_id=${config.settings.tgChatId}&text=${encodeURIComponent('Новый результат: ' + r.n)}`);
        }
    }
    render();
</script>
</body>
</html>
